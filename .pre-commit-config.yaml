repos:
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: 'v22.1.1'
    hooks:
    -   id: clang-format
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff
      args: [--fix]
    # Run the formatter.
    - id: ruff-format
